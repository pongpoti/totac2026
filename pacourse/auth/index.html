<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>E-learning</title>
    <style>
        iframe {
            width: 100vw;
            height: 85vh;
            display: block;
            border: none;
            overflow: hidden;
            margin: 0;
        }

        #container {
            visibility: hidden;
        }
    </style>
</head>

<body class="bg-black">
    <div class="drawer bg-black">
        <input id="my-drawer-1" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content">
            <div id="container">
                <div id="player"></div>
            </div>

        </div>
        <div class="drawer-side">
            <label for="my-drawer-1" aria-label="close sidebar" class="drawer-overlay"></label>
            <ul class="menu bg-base-200 min-h-full w-80 p-4">
                <li><button class="btn btn-ghost btn-active font-normal">Sidebar Item 1</button></li>
                <li><button class="btn btn-ghost btn-disabled">Sidebar Item 2</button></li>
            </ul>
        </div>
    </div>

    <div class="dock border-none bg-black">
        <label for="my-drawer-1" class="btn drawer-button">Open drawer</label>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Lock the screen orientation to portrait
        screen.orientation.lock("portrait")
        //if user refresh the page, redirect to signin page
        const hashParams = new URLSearchParams(window.location.hash.substring(1))
        const accessToken = hashParams.get("access_token")
        if (!accessToken) {
            window.location.replace("https://dolphin-app-a5itu.ondigitalocean.app/pacourse/signin")
        }
        // Initialize Supabase client
        const { createClient } = supabase
        const _supabase = createClient("https://akexkcjzgnlqlqrfxtdi.supabase.co", "sb_publishable_f9sKJUhh5ppG4tIyAXvF6A_hArSH2Af")
        //DOM variables
        const container = document.getElementById("container")
        //othet variables
        const youtube_playlist = {
            0: "",
            1: "FQgTtRnDEoA",
            2: "U6vl2A9ZVcc",
            3: "w5bY0ce46cc",
            4: "bwXShkYFYnc",
            5: "1d-K0-_T5b0",
            6: "7X4sgzfiMsk",
            7: "RF6HuDnFq-M",
            8: "peSvkc7jn-4",
            9: "qCp7scCpOLs",
            10: "pUPAIDaHXRQ",
            11: "BRHThXOYvwU",
            12: "EMePqJ98yRQ",
            13: "UdY0tsgmHnw",
            14: "8ZhKXgBX1Po",
            15: "FXvU-iCWy9I",
            16: "5QZs3r4PMl4",
            17: "F7vDsWuRx7I",
            18: "dNqxCodVE50"
        }
        let video_id = null
        var player
        // Listen for authentication state changes
        _supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === "SIGNED_IN" && session) {
                const { data: { user } } = await _supabase.auth.getUser()
                if (user) {
                    const res_check_id_null = await _supabase.from("data").select().eq("id", user.id)
                    if (res_check_id_null.data.length === 0) {
                        console.log("No existing record found for user. Inserting new record.")
                        await _supabase.from("data").insert({ id: user.id, email: user.email, vdo: 0 })
                    } else {
                        const res_get_vdo = await _supabase.from("data").select("vdo").eq("id", user.id).single()
                        const retrieved_vdo = res_get_vdo.data.vdo
                        video_id = youtube_playlist[retrieved_vdo]
                        if (video_id !== "") {
                            loadYouTubeIframeAPI()
                        }
                    }
                }
            }
        })
        //
        function loadYouTubeIframeAPI() {
            var tag = document.createElement('script')
            tag.src = "https://www.youtube.com/iframe_api"
            var firstScriptTag = document.getElementsByTagName('script')[0]
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag)
        }
        function onYouTubeIframeAPIReady() {
            player = new YT.Player("player", {
                videoId: video_id,
                playerVars: {
                    "playsinline": 1,
                    "disablekb": 1,
                    "controls": 0,
                },
                events: {
                    "onReady": onPlayerReady,
                    "onStateChange": onPlayerStateChange
                }
            })
        }
        function onPlayerReady(event) {
            container.style.visibility = "visible"
        }
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                console.log("Playing")
            } else if (event.data == YT.PlayerState.PAUSED) {
                console.log("Paused")
            } else if (event.data == YT.PlayerState.ENDED) {
                console.log("Ended")
            }
        }
    </script>

</body>

</html>
